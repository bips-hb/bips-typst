name: Gallery Preview

on:
  push:
    branches: [main]
    paths:
      - "theme.typ"
      - "bips-typst.typ"
      - "gallery/**"
      - ".github/**"

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.12.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-fira-sans fonts-fira-mono

      - name: Build gallery
        run: |
          chmod +x .github/scripts/build-gallery.sh
          .github/scripts/build-gallery.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - id: deploy
        uses: actions/deploy-pages@v4
