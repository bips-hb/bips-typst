name: Gallery Preview

on:
  push:
    branches: [main]
    paths:
      - "*.typ"
      - "gallery/**"
      - ".github/**"

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.13.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Download Fira fonts
        run: |
          mkdir -p .fonts
          base=https://github.com/google/fonts/raw/main/ofl
          for f in \
            firasans/FiraSans-Regular.ttf \
            firasans/FiraSans-Italic.ttf \
            firasans/FiraSans-Bold.ttf \
            firasans/FiraSans-BoldItalic.ttf \
            firasans/FiraSans-Light.ttf \
            firasans/FiraSans-SemiBold.ttf \
            firamono/FiraMono-Regular.ttf \
            firamono/FiraMono-Bold.ttf; do
            curl -sL "$base/$f" -o ".fonts/$(basename "$f")"
          done

      - name: Build gallery
        run: |
          chmod +x .github/scripts/build-gallery.sh
          .github/scripts/build-gallery.sh

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - id: deploy
        uses: actions/deploy-pages@v4
