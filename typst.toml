[package]
name = "bips-typst"
version = "0.1.1"
entrypoint = "bips-typst.typ"
authors = ["Lukas Burk <burk@leibniz-bips.de>"]
license = "MIT"
description = "BIPS presentation template for Typst with Touying"
homepage = "https://github.com/bips-hb/bips-typst"
repository = "https://github.com/bips-hb/bips-typst"
keywords = ["presentation", "slides", "academic", "beamer"]
categories = ["presentation"]
compiler = "0.12.0"
exclude = ["gallery/", "tests/", "debug/", "*.pdf", "justfile"]

[template]
path = "template"
entrypoint = "basic.typ"
thumbnail = "thumbnail.png"
